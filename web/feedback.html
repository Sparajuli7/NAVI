<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAVI — Feedback</title>
  <meta name="description" content="Share feedback, report bugs, or request features for NAVI — your offline AI language companion." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0F;
      --surface: #13131A;
      --border: #1E1E2A;
      --gold: #D4A853;
      --teal: #6BBAA7;
      --cream: #F5F0EB;
      --muted: #9090A0;
      --error: #F87171;
      --success: #4ade80;
      --font-display: Georgia, 'Times New Roman', serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-body);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      max-width: 1100px;
      margin: 0 auto;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--gold);
      letter-spacing: 0.05em;
      text-decoration: none;
    }
    nav a.nav-back {
      color: var(--muted);
      font-size: 0.875rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.15s;
    }
    nav a.nav-back:hover { color: var(--cream); }

    /* Form container */
    .form-container {
      max-width: 560px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .page-eyebrow {
      display: inline-block;
      background: rgba(107, 186, 167, 0.15);
      border: 1px solid rgba(107, 186, 167, 0.3);
      color: var(--teal);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 100px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      line-height: 1.2;
      margin-bottom: 0.75rem;
      color: var(--cream);
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    /* Form */
    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--cream);
    }

    label .optional {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.8rem;
      margin-left: 0.35rem;
    }

    /* Type chips */
    .type-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .type-chip {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .type-chip:hover {
      border-color: rgba(212, 168, 83, 0.4);
      color: var(--cream);
    }
    .type-chip input[type="radio"] {
      display: none;
    }
    .type-chip.selected {
      border-color: var(--gold);
      background: rgba(212, 168, 83, 0.1);
      color: var(--gold);
    }

    textarea, input[type="email"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.875rem 1rem;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 0.9rem;
      line-height: 1.6;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      width: 100%;
    }
    textarea {
      resize: vertical;
      min-height: 140px;
    }
    textarea::placeholder, input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }
    textarea:focus, input[type="email"]:focus {
      border-color: rgba(212, 168, 83, 0.5);
      box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.08);
    }

    .submit-btn {
      background: var(--gold);
      color: var(--bg);
      padding: 0.9rem 2rem;
      border-radius: 100px;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: opacity 0.15s, box-shadow 0.2s;
      margin-top: 0.5rem;
    }
    .submit-btn:hover:not(:disabled) {
      opacity: 0.92;
      box-shadow: 0 0 30px rgba(212, 168, 83, 0.3);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Status messages */
    .status {
      display: none;
      padding: 1rem 1.25rem;
      border-radius: 0.75rem;
      font-size: 0.9rem;
    }
    .status.success {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      background: rgba(74, 222, 128, 0.08);
      border: 1px solid rgba(74, 222, 128, 0.25);
      color: var(--success);
    }
    .status.error {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.25);
      color: var(--error);
    }
    .status-icon { flex-shrink: 0; font-size: 1.1rem; }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--cream); }

    /* Success screen */
    .success-screen {
      display: none;
      text-align: center;
      padding: 3rem 0;
    }
    .success-screen .big-icon { font-size: 3.5rem; margin-bottom: 1.25rem; }
    .success-screen h2 {
      font-family: var(--font-display);
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      color: var(--cream);
    }
    .success-screen p { color: var(--muted); margin-bottom: 2rem; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="/" class="logo">NAVI</a>
    <a href="/" class="nav-back">← Back to home</a>
  </nav>

  <div class="form-container">

    <!-- Form view -->
    <div id="form-view">
      <span class="page-eyebrow">Feedback</span>
      <h1>Tell us what you think.</h1>
      <p class="subtitle">Every message is read. You're helping build NAVI.</p>

      <form id="feedback-form" novalidate>

        <div class="field">
          <label>What kind of feedback is this?</label>
          <div class="type-chips" role="radiogroup" aria-label="Feedback type">
            <label class="type-chip selected" data-value="bug">
              <input type="radio" name="type" value="bug" checked /> 🐛 Bug
            </label>
            <label class="type-chip" data-value="feature">
              <input type="radio" name="type" value="feature" /> ✨ Feature Request
            </label>
            <label class="type-chip" data-value="ux">
              <input type="radio" name="type" value="ux" /> 🎨 UX / Design
            </label>
            <label class="type-chip" data-value="general">
              <input type="radio" name="type" value="general" /> 💬 General
            </label>
          </div>
        </div>

        <div class="field">
          <label for="message">Your feedback</label>
          <textarea
            id="message"
            name="message"
            placeholder="What happened? What would you like to see? The more detail the better."
            required
            minlength="10"
          ></textarea>
        </div>

        <div class="field">
          <label for="email">Email <span class="optional">(optional — only if you want a reply)</span></label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>

        <div id="status-msg" class="status" role="alert" aria-live="polite"></div>

        <button type="submit" class="submit-btn" id="submit-btn">
          Send feedback →
        </button>

      </form>
    </div>

    <!-- Success view (shown after submit) -->
    <div id="success-view" class="success-screen">
      <div class="big-icon">🙏</div>
      <h2>Thank you.</h2>
      <p>Your feedback has been received. It genuinely helps.</p>
      <a href="/" class="back-link">← Back to NAVI</a>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    <span>© 2025 NAVI</span>
    <span><a href="/">Home</a></span>
  </footer>

  <script>
    // ── Type chip selection ───────────────────────────────────────
    const chips = document.querySelectorAll('.type-chip');
    chips.forEach((chip) => {
      chip.addEventListener('click', () => {
        chips.forEach((c) => c.classList.remove('selected'));
        chip.classList.add('selected');
        chip.querySelector('input').checked = true;
      });
    });

    // ── Form submission ───────────────────────────────────────────
    const form = document.getElementById('feedback-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusMsg = document.getElementById('status-msg');
    const formView = document.getElementById('form-view');
    const successView = document.getElementById('success-view');

    const WORKER_URL = 'https://navi-feedback.shreyashparajuli.workers.dev';

    function showStatus(type, message) {
      statusMsg.className = 'status ' + type;
      statusMsg.innerHTML = `<span class="status-icon">${type === 'success' ? '✓' : '!'}</span><span>${message}</span>`;
    }

    function clearStatus() {
      statusMsg.className = 'status';
      statusMsg.innerHTML = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus();

      const messageText = form.message.value.trim();
      if (messageText.length < 10) {
        showStatus('error', 'Please enter at least 10 characters.');
        return;
      }

      const selectedType = form.querySelector('input[name="type"]:checked')?.value || 'general';
      const email = form.email.value.trim();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      try {
        const res = await fetch(WORKER_URL + '/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: selectedType,
            message: messageText,
            email: email || null,
            app_version: '1.0.0',
          }),
        });

        if (res.ok) {
          formView.style.display = 'none';
          successView.style.display = 'block';
        } else {
          const body = await res.json().catch(() => ({}));
          showStatus('error', body.error || 'Something went wrong. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send feedback →';
        }
      } catch {
        // Likely offline — store locally
        try {
          const pending = JSON.parse(localStorage.getItem('navi_pending_feedback') || '[]');
          pending.push({
            type: selectedType,
            message: messageText,
            email: email || null,
            created_at: new Date().toISOString(),
          });
          localStorage.setItem('navi_pending_feedback', JSON.stringify(pending));
          formView.style.display = 'none';
          successView.style.display = 'block';
        } catch {
          showStatus('error', 'Could not submit feedback. Check your connection and try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send feedback →';
        }
      }
    });
  </script>

</body>
</html>
